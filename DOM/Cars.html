<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Card</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
body {
  font-family: Arial;
  background: #eee;
}

.card {
  width: 350px;
  margin: 50px auto;
  border-radius: 10px;
  overflow: hidden;
  background: white;
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

.car-img {
  width: 100%;
  transition: 0.3s;
}

.card-body {
  padding: 20px;
  background: #4CAF50;
  color: white;
  transition: 0.3s;
}

.tag {
  background: red;
  padding: 5px 10px;
  border-radius: 5px;
  font-size: 12px;
}

.colors {
  margin: 10px 0;
}

.dot {
  height: 20px;
  width: 20px;
  border-radius: 50%;
  display: inline-block;
  margin-right: 10px;
  cursor: pointer;
  border: 2px solid white;
}

.gold { background: gold; }
.blue { background: blue; }
.red { background: red; }

button {
  padding: 10px 15px;
  border: none;
  margin-top: 10px;
  color: white;
  background: red;
  cursor: pointer;
  border-radius: 5px;
  transition: 0.3s;
}

button:hover {
  opacity: 0.8;
}
</style>

</head>
<body>

  <div class="d-flex">
<div class="card">
  <img id="carImage" src="./assets/car1.avif" class="car-img">

  <div class="card-body" id="cardBody">
    <span class="tag" id="tag">CAR</span>

    <h2>TATA Seira 2022</h2>
    <p><i class="fa fa-car"></i> Mileage: 4,000 miles</p>
    <p><i class="fa fa-gas-pump"></i> Fuel: 25mpg</p>
    <p><i class="fa fa-shield"></i> Safety: <i class="fa-solid fa-star" style="color: yellow;"></i><i class="fa-solid fa-star" style="color: yellow;"></i><i class="fa-solid fa-star" style="color: yellow;"></i><i class="fa-solid fa-star"style="color: yellow;"></i></p>
    
    <p>Pick a color:</p>

    <div class="colors">
      <span class="dot gold" onclick="changeCar('gold')"></span>
      <span class="dot blue" onclick="changeCar('blue')"></span>
      <span class="dot red" onclick="changeCar('red')"></span>
    </div>

    <h3>$134,450</h3>

    <button id="cartBtn">Add to Cart</button>
  </div>
</div>

<div class="card ">
  <img id="carImage1" src="./assets/car1.avif" class="car-img">

  <div class="card-body" id="cardBody">
    <span class="tag" id="tag1">CAR</span>

    <h2>TATA Seira 2022</h2>
    <p><i class="fa fa-car"></i> Mileage: 4,000 miles</p>
    <p><i class="fa fa-gas-pump"></i> Fuel: 25mpg</p>
    <p><i class="fa fa-shield"></i> Safety: <i class="fa-solid fa-star" style="color: yellow;"></i><i class="fa-solid fa-star" style="color: yellow;"></i><i class="fa-solid fa-star" style="color: yellow;"></i><i class="fa-solid fa-star"style="color: yellow;"></i></p>
    
    <p>Pick a color:</p>

    <div class="colors">
      <span class="dot gold" onclick="changeCar1('gold')"></span>
      <span class="dot blue" onclick="changeCar1('blue')"></span>
      <span class="dot red" onclick="changeCar1('red')"></span>
    </div>

    <h3>$134,450</h3>

    <button id="cartBtn1">Add to Cart</button>
  </div>
</div>
</div>

<script src="./cars.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>


</body>
</html>
