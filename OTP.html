<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
   <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
   
</head>
  <body class="bg-primary">
        <div class="container-fluid">
        <div class="row">
            <div class="col-12  col-md-6 p-5">
               <h1 class=" mt-4 text-light" style="border-left:8px solid white">OTP<br/>verification<br/> Javascript</h1> 
            </div>
    
            <div class="col-12 col-md-6 mt-5 ">
                <div class="container rounded bg-light p-4 h-100 w-75">
                    <p class="lead text-center">Enter OTP Code</p>
                    <div class="justify-content-around mb-2 text-center">
                    <input type="test" size="1" id="firstDigit" pattern="[0-9]*"  inputmode="numeric" maxlength="1" oninput="moveToNext('secondDigit')">
                    <input type="test" size="1" id="secondDigit" pattern="[0-9]*" inputmode="numeric" maxlength="1" oninput="moveToNext('thirdDigit')">
                    <input type="test" size="1" id="thirdDigit" pattern="[0-9]*"  inputmode="numeric" maxlength="1" oninput="moveToNext('fourthDigit')">
                    <input type="test" size="1" id="fourthDigit" pattern="[0-9]*"  inputmode="numeric" maxlength="1" oninput="moveToNext('btnverify')"><br/>
                    <button class="btn btn-primary mt-3" id="btnverify" onclick="verifyOTP()">Verify OTP</button>
                </div>
           </div>
        </div>
    </div>
</div>
    <div class="container w-25 " style="position:absolute;left:20px;">
       <button class="bg-light btn btn-light" onclick="generateOTP()">Generate OTP</button> 
    </div>

    <script>
        function generateOTP(){
            otp=String(1000 + Math.floor(Math.random()*9000))

            alert(`Your OTP ${otp}`)
        }

        function verifyOTP(){
            otpFirst=document.getElementById('firstDigit')
            otpSecond=document.getElementById('secondDigit')
            otpThird=document.getElementById('thirdDigit')
            otpFourth=document.getElementById('fourthDigit')
            const userOTP=Number(otpFirst.value+otpSecond.value+otpThird.value+otpFourth.value)

            if(!userOTP===otp){
                alert('Enter correct OTP')
            }else if(otp == userOTP){
                alert('Verified Successfully');
            }else{
                alert('Invalid OTP');
            }
            document.getElementById('firstDigit').value=''
            document.getElementById('secondDigit').value=''
            document.getElementById('thirdDigit').value=''
            document.getElementById('fourthDigit').value=''
        }

        function moveToNext(nextElmt){
             document.getElementById(nextElmt).focus()
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
