<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palindrome Checker</title>
</head>
<body>
    <script>
    let num=Number(prompt("Enter The Number"))
    temp=num
    reverse=0
while(num > 0){
    let rem = num % 10;
    reverse = reverse * 10 + rem;
    num = Math.floor(num / 10);
}
if(reverse==temp){
    document.write("Number is Palindrome number")
}else{
    document.write("Number is not Palindrome number")

}
    </script>
</body>
</html>
