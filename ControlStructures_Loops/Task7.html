<!DOCTYPE html>
<html>
<head>
<title>Prime Number</title>
</head>
<body>

<script>
let num = Number(prompt("Enter a number"));
let i;

for(i = 2; i < num; i++){
    if(num % i == 0){
        document.write("Not Prime Number");
        break;
    }
}
if(i == num && num > 1){
    document.write("Prime Number");
}
</script>

</body>
</html>
