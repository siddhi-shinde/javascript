<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divisors</title>
</head>
<body>
    <script>
        let num=Number(prompt("Enter the Number"))
        for(i=0;i<=num;i++){
            if(num%i==0){
               document.write(i)
            }
        }
         
    </script>
</body>
</html>
