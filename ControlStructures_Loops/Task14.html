<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factorial Number</title>
</head>
<body>
    <script>
        let num=Number(prompt("Enter the Number"))
        fact=0;
        i=num
        while(num>0){
            fact+=i
            i--
        }
        document.write("Factorial of"+num+"is"+fact)
    </script>
</body>
</html>
