<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Largest Number</title>
</head>
<body>
    <script>
        let n1=Number(prompt("Enter First Number"))
        let n2=Number(prompt("Enter Second Number"))
        let n3=Number(prompt("Enter Third Number"))
if(n1>n2 && n1>n3){
    document.write("The greater number is: "+n1)
}else if(n2>n1 && n2>n3){
    document.write("The greater number is: "+n2)
}else{
    document.write("The greater number is: "+n3)
}
    </script>
</body>
</html>
