<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplication Table</title>
</head>
<body>
    <script>
        let num=Number(prompt("Enter the Number"));

        for(let i=1;i<=10;i++){
            let multiple=num*i;
            document.write(num+"x"+i+"="+multiple+"<br/>")
        }
        
    </script>
</body>
</html>
