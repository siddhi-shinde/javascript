<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Count Vowels And Consonents</title>
</head>
<body>
    <script>
        let str=prompt("Enter a string")
        vowels="aeiouAEIOU"
        count = 0
for(i=0; i< str.length; i++){
    if(vowels.includes(str.charAt(i))){
        count++
        document.write("Number of Vowels in string is:"+count)
    }
}
    </script>
</body>
</html>
