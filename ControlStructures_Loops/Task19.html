<!DOCTYPE html>
<html>
<head>
<title>Armstrong Number</title>
</head>
<body>

<script>
let num = prompt("Enter a number");
let temp = num;
let sum = 0;

while(num > 0){
    let rem = num % 10;
    sum = sum + (rem * rem * rem);
    num = Math.floor(num / 10);
}

if(sum == temp){
    document.write(sum+" is an Armstrong Number");
}else{
    document.write(sum+" is not Armstrong Number");
}
</script>

</body>
</html>
