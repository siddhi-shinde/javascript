<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sum</title>
</head>
<body>
   <script>
   
    sumEven=0
    for(let i=1;i<=100;i++){
        if(i%2==0){
                sumEven+=i
            } 
        }
    document.write("Sum of Even Numbers is:"+sumEven+"</br>")
 sumOdd=0
    for(let j=1;j<=100;j++){
        if(j%2!=0){
                sumOdd+=j
            } 
        }
    document.write("Sum of Odd Numbers is:"+sumOdd)
   </script> 
</body>
</html>
