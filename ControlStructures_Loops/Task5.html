<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sum of Digits</title>
</head>
<body>
    <p id="result"></p>
    <script>
    let num=Number(prompt("Enter the Number"))
        do{
        sum=0
        let rem=num%10
        sum+=rem
        num=(num/10)
        document.write("Sum of Digits:"+sum)
        }while(num>=0)
        
    </script>
</body>
</html>
