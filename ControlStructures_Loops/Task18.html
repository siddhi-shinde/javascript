<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fibonacci Series</title>
</head>
<body>
    <script>
      let first=0
      let second=1
      let third
    let n=Number(prompt("How many Terms"))
    document.write("Fibonacci Series:"+first+" "+second+" ")
    for(let i=3;i<=n;i++){
        third=first+second  
        document.write(" "+third)
        first=second
        second=third 
       
    } 
    </script>
</body>
</html>
