<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Password Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <div class="container bg-light w-50 mb-5 mt-5"> 
        <h1>Password Generator</h1>
  <div class="mb-3">
    <label for="passwordlen" class="form-label">Password Length :</label>
    <input type="number" class="form-control w-50" value="8" min="8" max="20" id="passwordlen">
  </div>
  <div class="mb-3 form-check">
    <input type="checkbox" class="form-check-input" id="includeNum">
    <label class="form-check-label" for="includeNum">Include Numbers</label>
  </div>
  <div class="mb-3 form-check">
    <input type="checkbox" class="form-check-input" id="includeUpperCase">
    <label class="form-check-label" for="includeUpperCase">Include Uppercase</label>
  </div>
  <div class="mb-3 form-check">
    <input type="checkbox" class="form-check-input" id="includeSpeChar">
    <label class="form-check-label" for="includeSpeChar">Include Special Characters</label>
  </div>
  <div class="mb-3 form-check">
    <input type="checkbox" class="form-check-input" id="excludeAmbiguous">
    <label class="form-check-label" for="excludeAmbiguous">Exclude ambiguous characters(e.g.l, I, 1, 0, o)</label>
  </div>
 <button class="btn btn-outline-primary mt-3" onclick="generatePassword()">Generate Password</button><br/><br/>
  <div class="mb-3">
    <label for="InputPassword" class="form-label">Generated Password :</label>
    <input type="password" class="form-control w-50" id="InputPassword" readonly>
  </div>
<div class="mb-3 form-check">
    <input type="checkbox" class="form-check-input" id="showPassword" onclick="showPassword()">
    <label class="form-check-label" for="showPassword">Show Password</label>
</div>
     
<div class="progress" id="progressBar" aria-valuemin="0" aria-valuemax="100">
  <div class="progress-bar" id="strength" role="progressbar"></div>
</div><br/>
<div>
<button  class="btn btn-outline-secondary  mb-2" onclick="copyPassword()">Copy</button> 
 </div>  
    </div>

    <script>

    function generatePassword(){
    length = document.getElementById("passwordlen").value;
    includeNumbers = document.getElementById("includeNum").checked;
    includeUppercase = document.getElementById("includeUpperCase").checked;
    includeSpecial = document.getElementById("includeSpeChar").checked;

    charset = "abcdefghijklmnopqrstuvwxyz"
    if(includeNumbers) {
      charset += "0123456789"
    }
    if(includeUppercase){
      charset += "ABCDEFGHIJKLMNOPQRSTUVWXYZ"
    }
    if (includeSpecial){
      charset += "!@#$%^&*()_+";
    }
    if (document.getElementById("excludeAmbiguous").checked) {
      charset = charset.replace(/[l1I0O]/g, "");
    }
      
let password = ""
for(let i=0;i<length;i++){
   password += charset.charAt(Math.floor(Math.random() * charset.length));
  }
document.getElementById('InputPassword').value = password
progressStrength(password)
}

function progressStrength(password) {
  const progressBar = document.getElementById("progressBar");
  const str = document.getElementById("strength");

  if (!password) {
    progressBar.style.width = "0%";
    str.textContent = "";
    progressBar.className = "progress-bar";
    return;
  }

  let strength = 0;

  if (password.length >= 8){
     strength++;
  }
  if (/[A-Z]/.test(password)){ 
    strength++;
  }
  if (/[0-9]/.test(password)){
     strength++;
  }
  if (/[^A-Za-z0-9]/.test(password)){
     strength++;
  }

  let width = (strength / 4) * 100;
  progressBar.style.width = width + "%";

  
  progressBar.className = "progress-bar";

  if (strength === 1) {
    str.textContent = "Weak";
    progressBar.classList.add("bg-danger");
  } else if (strength === 2) {
    str.textContent = "Medium";
    progressBar.classList.add("bg-warning");
  } else if (strength === 3) {
    str.textContent = "Strong";
    progressBar.classList.add("bg-info");
  } else if (strength === 4) {
    str.textContent = "Very Strong";
    progressBar.classList.add("bg-success");
  }
}

    function showPassword(){
     input = document.getElementById('InputPassword') 
    if (input.type === "password") {
      input.type = "text";
    } else {
    input.type = "password";
    }
    }

    function copyPassword(){
      result = document.getElementById('InputPassword')
      result.select();
      navigator.clipboard.writeText(InputPassword.value)
      alert('Copied to clipboard..!')
     
    }

    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
