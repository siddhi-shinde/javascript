<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<style>
    #errUserName{
        display: none;
    }
</style>  
</head>
  <body>
        <div class="container mt-5">
        <div class="row">
            <div class="col-12 col-md-6"></div>
            <div class="col-12 col-md-6 p-3 bg-light rounded mt-5">
               
                    <div class="mb-3">
                        <label for="InputUserName" class="form-label">User Name</label>
                        <input type="text" class="form-control" id="InputUserName" >
                        <div class="alert alert-danger alert-dismissible fade show" role="alert" id="errUserName">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="InputEmail1" class="form-label">Email address</label>
                        <input type="email" class="form-control" id="InputEmail1" aria-describedby="emailHelp">
                    </div>
                    <div class="mb-3">
                        <label for="InputPassword1" class="form-label">Password</label>
                        <input type="password" class="form-control" id="InputPassword1">
                    </div>
                    <div class="mb-3">
                        <label for="ReInputPassword1" class="form-label">Repeat Password</label>
                        <input type="password" class="form-control" id="ReInputPassword1">
                    </div>
                    <button class="btn btn-primary" onclick="register()">Register</button>
              
            </div>
        </div>
    </div>

<script>
    userNameElement = document.querySelector('#InputUserName')
    emailElement = document.querySelector('#InputEmail1')
    passwordElement = document.querySelector('#InputPassword1')
    rePasswordElement = document.querySelector('#ReInputPassword1')

    function register(){
        console.log("****************")
        userName = userNameElement.value.trim() 
        emailVal = emailElement.value.trim()
        passwordVal = passwordElement.value.trim() 
        rePasswordVal = rePasswordElement.value.trim() 

        speChars = `!@#$%^&*()_{""}`
         // username validation
        if(userName.length < 6){
            showError("Username should contain at least 6 characters")
            return
        }

        for(let char of userName){
            if(speChars.includes(char)){
                showError("Username must not include special characters")
                return
            }
        }

        // Email validation
        let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/
        if(!emailPattern.test(emailVal)){
            showError("Enter valid email address")
            return
        }

        // Password validation
        if(passwordVal.length < 6){
            showError("Password must be at least 6 characters")
            return
        }

        // Re-password
        if(passwordVal !== rePasswordVal){
            showError("Passwords do not match")
            return
        }

        // CREATE OBJECT
        let userObj = {
            name: userName,
            email: emailVal,
            password: passwordVal
        }

        // save to local storage
        localStorage.setItem('userData', JSON.stringify(userObj))

        // succcess message 
        alert("Register success")

        // navigate to Login page
        window.location.href = "login.html"
    }

    function showError(message){
        let errBox = document.getElementById("errUserName")
        errBox.style.display = 'block'
        errBox.innerHTML = `${message}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>`
    }
</script>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
