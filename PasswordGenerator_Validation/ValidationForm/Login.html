<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="bg-primary">


    <div class="container mt-5">
        <div class="row">
            <div class="col-12 col-md-6"></div>
            <div class="col-12 col-md-6 p-3 bg-light rounded mt-5">
                
                    <div class="mb-3">
                        <label for="InputEmail1" class="form-label">Email address</label>
                        <input type="email" class="form-control" id="InputEmail1" aria-describedby="emailHelp">
                        <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
                    </div>
                    <div class="mb-3">
                        <label for="InputPassword1" class="form-label">Password</label>
                        <input type="password" class="form-control" id="InputPassword1">
                    </div>
                    <button class="btn btn-primary" onclick="login()">Login</button>
              
            </div>
        </div>
    </div>

<script>

    emailElement = document.querySelector('#InputEmail1')
    passwordElement = document.querySelector('#InputPassword1')
    function login(){
        emailValue = emailElement.value
        passwordValue = passwordElement.value 

        storeUser = JSON.parse(localStorage.getItem('userData'))

        if(emailValue.length === 0){
            alert('Please Enter the Email')
        }
        if(!storeUser){
            alert('No user Registered')
        }
        
        if(emailValue === storeUser.email){
             if(passwordValue == storeUser.password){
            alert('Login Successfully')
            window.location.href='./home.html'
        }else{
        alert('Invalid Password')
        }
    }else{
        alert('User Not Registered')
    }
    
    }

 
</script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
