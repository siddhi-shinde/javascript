<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>String Operations</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: linear-gradient(135deg, #74ebd5, #9face6);
        min-height: 100vh;
      }

      .card {
        border: none;
        border-radius: 15px;
      }

      textarea {
        border-radius: 10px;
      }

      button {
        border-radius: 20px !important;
        font-weight: 500;
      }

      button:hover {
        transform: scale(1.05);
        transition: 0.2s;
      }

      #output {
        font-size: 18px;
        font-weight: 500;
      }
    </style>
  </head>

  <body>
    <div class="container mt-5 w-75">
      <h1 class="text-center text-white fw-bold mb-4">
        Operations on String in JavaScript
      </h1>

      <!-- Input Section -->

      <div class="card shadow p-4 mb-4">
        <textarea
          class="form-control mb-3"
          id="inputPara"
          rows="4"
          placeholder="Add Paragraph here..."
        ></textarea>

        <div class="alert alert-dark text-center" id="output">
          Result will appear here
        </div>
      </div>

      <!-- Buttons Section -->

      <div class="card shadow p-4">
        <div class="row g-3">
          <div class="col-md-3 col-6">
            <button class="btn btn-primary w-100 shadow" onclick="vowelCount()">
              Check Vowels
            </button>
          </div>

          <div class="col-md-3 col-6">
            <button
              class="btn btn-primary w-100 shadow"
              onclick="consonantCount()"
            >
              Check Consonants
            </button>
          </div>

          <div class="col-md-3 col-6">
            <button
              class="btn btn-primary w-100 shadow"
              onclick="countSpaces()"
            >
              Count Spaces
            </button>
          </div>

          <div class="col-md-3 col-6">
            <button class="btn btn-primary w-100 shadow" onclick="countLines()">
              Count New Lines
            </button>
          </div>

          <div class="col-md-3 col-6">
            <button class="btn btn-success w-100 shadow" onclick="toSmall()">
              Convert to Small Case
            </button>
          </div>

          <div class="col-md-3 col-6">
            <button class="btn btn-success w-100 shadow" onclick="capitalise()">
              Capitalise
            </button>
          </div>

          <div class="col-md-3 col-6">
            <button class="btn btn-success w-100 shadow" onclick="titleCase()">
              Title Case
            </button>
          </div>

          <div class="col-md-3 col-6">
            <button
              class="btn btn-danger w-100 shadow"
              onclick="palindromeCheck()"
            >
              Check Palindrome
            </button>
          </div>

          <div class="col-md-3 col-6">
            <button
              class="btn btn-info w-100 shadow text-white"
              onclick="firstWord()"
            >
              Extract First Word
            </button>
          </div>

          <div class="col-md-3 col-6">
            <button
              class="btn btn-info w-100 shadow text-white"
              onclick="replaceSpaces()"
            >
              Replace Spaces
            </button>
          </div>

          <div class="col-md-3 col-6">
            <button
              class="btn btn-warning w-100 shadow"
              onclick="reverseText()"
            >
              Reverse Characters
            </button>
          </div>

          <div class="col-md-3 col-6">
            <button class="btn btn-warning w-100 shadow" onclick="sortWords()">
              Sort Words
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="./script.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
