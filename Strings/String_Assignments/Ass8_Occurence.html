<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Occurence</title>
</head>
<body>
   <script>
    let str=prompt("Enter a string")
    let char=prompt("Enter a character")
    let count=0
    for(let i=0;i<=str.length;i++){
        if(str[i]==char){
            count++
        }
    }
    document.write("Numbar of Occurences are: "+count)
   </script> 
</body>
</html>
