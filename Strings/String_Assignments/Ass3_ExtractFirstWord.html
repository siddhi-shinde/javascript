<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extract First Word</title>
</head>
<body>
    <script>
        let str=prompt("Enter a sentence")
       
       let space= str.indexOf(" ");
        let substr= str.substring(0,space);
        
        document.write(substr);
    </script>
</body>
</html>
