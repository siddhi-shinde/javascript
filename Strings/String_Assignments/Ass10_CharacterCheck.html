<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character</title>
</head>
<body>
   <script>
    let str=prompt("Enter a string")
 if(str[0]===str[str.length-1]){
       document.write("Starts and Ends with same character")  
    }else{
       document.write("Starts and Ends with different character")  

    }
   </script> 
</body>
</html>
