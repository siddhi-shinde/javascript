<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="discount"></p>
    <script>
        let TotalAmt=Number(prompt("Enter Total Amount"))

        if(TotalAmt>100){
            TotalAmt-=TotalAmt*0.1;
            document.getElementById("discount").innerHTML="Dicounted Total :"+TotalAmt;
        }
    </script>
</body>
</html>
