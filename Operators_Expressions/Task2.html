<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparison Operator</title>
</head>
<body>
    <p id="greater"></p>
    <p id="small"></p>
    <p id="equal"></p>
    <script>
        let num1=prompt("Enter first Number")
        let num2=prompt("Enter second Number")
        
        document.getElementById("greater").innerHTML="Is first number is greater than second?"+(num1>num2)
        document.getElementById("small").innerHTML="Is second number is greater than first?"+(num2>num1)
        document.getElementById("equal").innerHTML="Are the two numbers are equal?"+(num2==num1)  
        
    </script>
</body>
</html>
