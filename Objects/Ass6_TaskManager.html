<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Task Manager</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body
    class="bg-light d-flex justify-content-center align-items-center vh-100"
  >
    <div class="card shadow p-4" style="width: 400px">
      <h3 class="text-center mb-3">Task Manager</h3>

      <input
        type="text"
        id="taskInput"
        class="form-control mb-3"
        placeholder="Enter task"
      />

      <div class="d-flex justify-content-between mb-3">
        <button class="btn btn-success" onclick="addTask()">Add</button>
        <button class="btn btn-primary" onclick="showTasks()">Show</button>
        <button class="btn btn-warning" onclick="updateTask()">Update</button>
        <button class="btn btn-danger" onclick="deleteTask()">Delete</button>
      </div>

      <ul id="taskList" class="list-group"></ul>
    </div>

    <script>
      let tasks = [];

      // Add Task
      function addTask() {
        let task = document.getElementById("taskInput").value;
        tasks.push(task);
        document.getElementById("taskInput").value = "";
        showTasks();
      }

      // Show Tasks
      function showTasks() {
        let list = document.getElementById("taskList");
        list.innerHTML = "";

        tasks.forEach(function (t, i) {
          list.innerHTML +=
            "<li class='list-group-item'>" + i + " : " + t + "</li>";
        });
      }

      // Delete Task
      function deleteTask() {
        let index = prompt("Enter task index to delete");
        tasks.splice(index, 1);
        showTasks();
      }

      // Update Task
      function updateTask() {
        let index = prompt("Enter task index to update");
        let newTask = prompt("Enter new task");
        tasks[index] = newTask;
        showTasks();
      }
    </script>
  </body>
</html>
