<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">

<div class="card shadow p-4 text-center" style="width:420px">

<h3 class="mb-4">Calculator</h3>

<div class="row mb-3">
    <div class="col">
        <input type="number" id="num1" placeholder="Num1" class="form-control" />
    </div>
     <div class="col">
        <input type="number" id="num2" placeholder="Num2" class="form-control" />
    </div>
</div>


<!-- Buttons -->
<div class="d-flex justify-content-between mb-3">
    <button class="btn btn-primary" onclick="calculate('add')">Add</button>
    <button class="btn btn-primary" onclick="calculate('sub')">Subtract</button>
    <button class="btn btn-primary" onclick="calculate('mult')">Multiply</button>
    <button class="btn btn-primary" onclick="calculate('div')">Divide</button>
</div>  

<h4>Result:<span id="calculate">0</span></h4>
       
   <script src="Ass4_Calculator.js">
   </script> 
</body>
</html>
