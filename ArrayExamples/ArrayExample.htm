   <div class="container w-75 rounded m-5 p-3 text-center" style="background-color: rgb(203, 195, 195); height:300px;">
    <h2>Assignent 1 To Do List Manager</h2>
    <div class="container">
      <input type="text" id="inputAss1" />
      <button class="btn btn-primary" onclick="addToDos()">Add Task</button>
      <button class="btn btn-primary" onclick="clearAllToDos()">Clear All</button>
    </div>
    <div class="container" id="resultToDo"></div>
    </div>
    <div class="container">
      <p>Project 1</p>
    </div>
  
    <script>
      toDos = []

      function renderToDos(){
         document.querySelector('#resultToDo').innerHTML=toDos.map((task,index)=>`
                                                      <div class='mb-1'>
                                                        <b class=text-secondary pe-5'>${task}</b>
                                                        <button class='btn btn-danger' onclick='deleteTask(${index})'>DELETE</button>
                                                      </div>
        `).join('')
      }

      function addToDos(){
        inputEle=document.querySelector('#inputAss1')
        newToDo=inputEle.value
        toDos.push(newToDo)
        // console.log(toDos)
        renderToDos()
        console.log(inputEle.value)
        inputEle.value=''
        console.log(inputEle.value)
      }

      function clearAllToDos(){
        console.log(toDos)
        toDos=[]
        renderToDos()
        console.log(toDos)
      }

      function deleteTask(i){
        console.log(i)
        toDos.splice(i,1)
        renderToDos()
      }
    </script>
