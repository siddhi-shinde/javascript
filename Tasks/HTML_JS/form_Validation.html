<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Form Validation</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { 
    background:#eef2f7; 
}

.card {
     border-radius:15px;
     }

.error {
    color: red;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="container mt-5">
  <div class="row justify-content-center">
    
    <div class="col-md-6 col-lg-4 col-sm-10">
      <div class="card shadow p-4">
        
        <h3 class="text-center mb-3">Register</h3>

        <form onsubmit="return validateForm()">

          
          <input type="text" id="name" class="form-control mb-1" placeholder="Enter Name">
          <div id="nameError" class="error mb-2"></div>

          
          <input type="text" id="email" class="form-control mb-1" placeholder="Enter Email">
          <div id="emailError" class="error mb-2"></div>

         
          <input type="password" id="pass" class="form-control mb-1" placeholder="Enter Password">
          <div id="passError" class="error mb-3"></div>

          <button class="btn btn-success w-100">Submit</button>

        </form>

      </div>
    </div>

  </div>
</div>

<script>
function validateForm(){

    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let pass = document.getElementById("pass").value.trim();

    
    document.getElementById("nameError").innerText="";
    document.getElementById("emailError").innerText="";
    document.getElementById("passError").innerText="";

    
    let namePattern = /^[A-Za-z ]{3,}$/;
    let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
    let passPattern = /^(?=.*[A-Z])(?=.*[0-9]).{6,}$/;

    let valid = true;

   
    if(!namePattern.test(name)){
        document.getElementById("nameError").innerText = "Name must be at least 3 letters";
        valid = false;
    }

    
    if(!emailPattern.test(email)){
        document.getElementById("emailError").innerText = "Enter valid email";
        valid = false;
    }

    
    if(!passPattern.test(pass)){
        document.getElementById("passError").innerText = "Password must contain 1 capital letter & number";
        valid = false;
    }

    return valid;
}
</script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>


</body>
</html>
