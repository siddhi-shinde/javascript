<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ToDoList</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<title>To-Do</title>

<style>
body {
    background: #eef2f7;
}

.card {
    border-radius: 15px;
}

.list-group-item {
    border-radius: 10px !important;
    margin-bottom: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container mt-5">
  <div class="row justify-content-center">
    
   
    <div class="col-md-6 col-lg-5 col-sm-10">
      
      <div class="card shadow p-4">
        <h3 class="text-center mb-3">To-Do List</h3>

        <div class="input-group mb-3">
          <input type="text" id="taskInput" class="form-control" placeholder="Enter task">
          <button class="btn btn-primary" onclick="addTask()">Add</button>
        </div>

        <ul id="list" class="list-group"></ul>
      </div>

    </div>

  </div>
</div>

<script>
function addTask() {
    let input = document.getElementById("taskInput");
    if(input.value==="") return;

    let li = document.createElement("li");
    li.className = "list-group-item d-flex justify-content-between align-items-center";

    li.innerHTML = `<span>${input.value}</span>
    <button class="btn btn-danger btn-sm">Delete</button>`;

    li.querySelector("button").onclick = () => li.remove();

    li.onclick = () => li.classList.toggle("text-decoration-line-through");

    document.getElementById("list").appendChild(li);
    input.value="";
}
</script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>


</body>
</html>
