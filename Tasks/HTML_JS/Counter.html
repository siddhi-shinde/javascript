<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Counter With Button</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background:#eef2f7;
}

.card {
    border-radius: 15px;
}

.counter {
    font-size: 70px;
    font-weight: bold;
    transition: 0.2s;
}
</style>
</head>

<body>

<div class="container mt-5">
  <div class="row justify-content-center">

    
    <div class="col-md-6 col-lg-4 col-sm-10">

      <div class="card shadow p-4 text-center">
        <h3 class="mb-3">Counter</h3>

        <div id="count" class="counter">0</div>

        <div class="mt-4 d-flex justify-content-between gap-2">
          <button class="btn btn-success w-100" onclick="change(1)">+</button>
          <button class="btn btn-danger w-100" onclick="change(-1)">-</button>
          <button class="btn btn-secondary w-100" onclick="reset()">reset</button>
        </div>

      </div>

    </div>

  </div>
</div>

<script>
let count = localStorage.getItem("count") || 0;
document.getElementById("count").innerText = count;

function change(val){
    count = Number(count) + val;
    updateUI();
}

function reset(){
    count = 0;
    updateUI();
}


function updateUI(){
    let display = document.getElementById("count");
    display.innerText = count;

    
    localStorage.setItem("count", count);

    
    if(count > 0){
        display.classList.add("text-success");
        display.classList.remove("text-danger");
    }
    else if(count < 0){
        display.classList.add("text-danger");
        display.classList.remove("text-success");
    }
    else{
        display.classList.remove("text-success","text-danger");
    }
}
</script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>


</body>
</html>
