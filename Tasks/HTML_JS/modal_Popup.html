<!doctype html>
<html>
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background:#eef2f7;
}

.card {
    border-radius: 15px;
}
</style>
</head>

<body>

<div class="container mt-5">
  <div class="row justify-content-center">

    <div class="col-md-6 col-lg-4 col-sm-10">

      <div class="card shadow p-4 text-center">
        <h3 class="mb-3">Modal Popup</h3>

        <button class="btn btn-primary w-100" onclick="openModal()">
          Open
        </button>
      </div>

    </div>

  </div>
</div>


<div id="modalBox" class="position-fixed top-0 start-0 w-100 h-100 d-none justify-content-center align-items-center" style="background: rgba(0,0,0,0.5);">

  <div class="bg-white p-4 rounded" style="width:300px;">
    <h5>Popup</h5>
    <p>This is a simple modal popup.</p>

    <button class="btn btn-secondary w-100" onclick="closeModal()">Close</button>
  </div>

</div>

<script>
function openModal(){
    document.getElementById("modalBox").classList.remove("d-none");
    document.getElementById("modalBox").classList.add("d-flex");
}

function closeModal(){
    document.getElementById("modalBox").classList.remove("d-flex");
    document.getElementById("modalBox").classList.add("d-none");
}
</script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>


</body>
</html>
